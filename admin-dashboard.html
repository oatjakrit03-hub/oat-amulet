<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดการพระเครื่อง | แอดมิน</title>
<style>
    body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    h2 { color: #d4af37; border-bottom: 1px solid #8b6b1f; padding-bottom: 10px; }
    .form-box { background: #262626; padding: 25px; border-radius: 12px; border: 1px solid #8b6b1f; margin-bottom: 30px; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; background: #333; color: #fff; border: 1px solid #555; box-sizing: border-box;}
    button { background: #d4af37; color: #000; font-weight: bold; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; }
    .logout-btn { background: #b30000; color: #fff; float: right; padding: 8px 15px; }
    
    .amulet-list { background: #262626; padding: 20px; border-radius: 12px; }
    .amulet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #444; }
    .delete-btn { background: #b30000; color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 14px; }
</style>
</head>
<body>

<div class="container">
    <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    <h2>ระบบแอดมินจัดการหลังบ้าน (โอ๊ต บางชัน)</h2>
    
    <!-- ส่วนของฟอร์มเพิ่มพระ -->
    <div class="form-box">
        <h3>➕ เพิ่มพระเครื่ององค์ใหม่</h3>
        <input type="text" id="name" placeholder="ชื่อพระเครื่อง (เช่น เหรียญรุ่นแรก...)">
        <input type="text" id="price" placeholder="ราคาเช่าบูชา (บาท) (หากไม่ใส่จะแสดงว่าติดต่อสอบถาม)">
        <textarea id="description" rows="3" placeholder="รายละเอียด เช่น เนื้อทองแดง บล็อกนิยม สภาพสวยเดิม..."></textarea>
        <select id="status">
            <option value="available">พร้อมเช่าบูชา</option>
            <option value="sold">มีผู้เช่าบูชาแล้ว</option>
        </select>
        <label>รูปภาพพระเครื่อง (ใส่ลิงก์รูปภาพ เช่น ลิงก์จาก github หรือโฮสต์รูป แยกแต่ละรูปด้วยเครื่องหมายจุลภาค ,)</label>
        <input type="text" id="images" placeholder="https://image1.jpg, https://image2.jpg">
        
        <button onclick="addAmulet()">บันทึกข้อมูลพระเครื่อง</button>
    </div>

    <!-- รายการพระเครื่องที่มีอยู่ในระบบ -->
    <div class="amulet-list">
        <h3>📋 รายการพระเครื่องทั้งหมดในระบบ</h3>
        <div id="listContainer">กำลังโหลดข้อมูลรายการพระเครื่อง...</div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // เช็คว่าล็อกอินอยู่จริงไหม ถ้าไม่จริงให้เด้งไปหน้า login
    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "admin-login.html";
        } else {
            loadAmulets();
        }
    });

    // ฟังก์ชันเพิ่มข้อมูลพระ
    function addAmulet() {
        const name = document.getElementById("name").value.trim();
        const price = document.getElementById("price").value.trim();
        const description = document.getElementById("description").value.trim();
        const status = document.getElementById("status").value;
        const imagesInput = document.getElementById("images").value.trim();

        if(!name) { alert("กรุณากรอกชื่อพระเครื่อง"); return; }

        // แปลงข้อความลิงก์รูปภาพเป็น Array []
        const imagesArray = imagesInput ? imagesInput.split(",").map(url => url.trim()) : [];

        db.collection("amulets").add({
            name: name,
            price: price,
            description: description,
            status: status,
            images: imagesArray,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("เพิ่มข้อมูลพระเครื่องเรียบร้อยแล้ว!");
            // เคลียร์ฟอร์ม
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
            document.getElementById("description").value = "";
            document.getElementById("images").value = "";
            loadAmulets();
        })
        .catch(err => alert("เกิดข้อผิดพลาด: " + err.message));
    }

    // โหลดรายการพระทั้งหมดมาโชว์ในหน้า Dashboard
    function loadAmulets() {
        db.collection("amulets").orderBy("createdAt", "desc").get().then(querySnapshot => {
            const container = document.getElementById("listContainer");
            container.innerHTML = "";
            
            if(querySnapshot.empty) {
                container.innerHTML = "ยังไม่มีข้อมูลพระเครื่องในระบบ";
                return;
            }

            querySnapshot.forEach(doc => {
                const data = doc.data();
                const item = document.createElement("div");
                item.className = "amulet-item";
                item.innerHTML = `
                    <div>
                        <strong>${data.name}</strong> - ${data.price || 'ติดต่อสอบถาม'} บาท 
                        (${data.status === 'available' ? 'พร้อมเช่า' : 'ขายแล้ว'})
                    </div>
                    <button class="delete-btn" onclick="deleteAmulet('${doc.id}')">ลบ</button>
                `;
                container.appendChild(item);
            });
        });
    }

    // ฟังก์ชันลบพระเครื่อง
    function deleteAmulet(id) {
        if(confirm("คุณต้องการลบพระเครื่ององค์นี้ใช่หรือไม่? ข้อมูลจะหายถาวร")) {
            db.collection("amulets").doc(id).delete().then(() => {
                alert("ลบข้อมูลสำเร็จ!");
                loadAmulets();
            });
        }
    }

    function logout() {
        auth.signOut().then(() => window.location.href = "admin-login.html");
    }
</script>
</body>
</html>
