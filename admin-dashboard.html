<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดการพระเครื่อง | แอดมิน</title>
<style>
    body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    h2 { color: #d4af37; border-bottom: 1px solid #8b6b1f; padding-bottom: 10px; }
    .form-box { background: #262626; padding: 25px; border-radius: 12px; border: 1px solid #8b6b1f; margin-bottom: 30px; position: relative; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; background: #333; color: #fff; border: 1px solid #555; box-sizing: border-box;}
    button { background: #d4af37; color: #000; font-weight: bold; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; }
    .logout-btn { background: #b30000; color: #fff; float: right; padding: 8px 15px; }
    .cancel-btn { background: #555; color: #fff; margin-left: 10px; display: none; }
    
    .amulet-list { background: #262626; padding: 20px; border-radius: 12px; }
    .amulet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #444; }
    .action-btns { display: flex; gap: 8px; }
    .edit-btn { background: #0084ff; color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
    .delete-btn { background: #b30000; color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
    <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    <h2>ระบบแอดมินจัดการหลังบ้าน (โอ๊ต บางชัน)</h2>
    
    <div class="form-box">
        <h3 id="formTitle">➕ เพิ่มพระเครื่ององค์ใหม่</h3>
        <input type="text" id="name" placeholder="ชื่อพระเครื่อง (เช่น เหรียญรุ่นแรก...)">
        <input type="text" id="price" placeholder="ราคาเช่าบูชา (บาท) (หากไม่ใส่จะแสดงว่าติดต่อสอบถาม)">
        <textarea id="description" rows="4" placeholder="รายละเอียด เช่น เนื้อทองแดง บล็อกนิยม สภาพสวยเดิม..."></textarea>
        <select id="status">
            <option value="available">พร้อมเช่าบูชา</option>
            <option value="sold">มีผู้เช่าบูชาแล้ว</option>
        </select>
        <label style="font-size: 14px; color: #aaa;">รูปภาพพระเครื่อง (แยกแต่ละรูปภาพด้วยเครื่องหมายจุลภาค ,)</label>
        <input type="text" id="images" placeholder="เช่น https://site.com/img1.jpg, https://site.com/img2.jpg">
        
        <button id="submitBtn" onclick="submitForm()">บันทึกข้อมูลพระเครื่อง</button>
        <button id="cancelBtn" class="cancel-btn" onclick="resetForm()">ยกเลิกการแก้ไข</button>
    </div>

    <div class="amulet-list">
        <h3>📋 รายการพระเครื่องทั้งหมดในระบบ</h3>
        <div id="listContainer">กำลังโหลดข้อมูลรายการพระเครื่อง...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    // ตั้งค่า Firebase ของคุณโอ๊ต
    const firebaseConfig = {
        apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
        authDomain: "oat-amulet-shop.firebaseapp.com",
        projectId: "oat-amulet-shop",
        storageBucket: "oat-amulet-shop.firebasestorage.app",
        messagingSenderId: "868077170885",
        appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
        measurementId: "G-GLR77H4VEH"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ตัวแปรเก็บ ID พระเครื่องที่กำลังแก้ไข (ถ้าเป็น null แปลว่ากำลังเพิ่มใหม่)
    let currentEditId = null;

    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "admin-login.html";
        } else {
            loadAmulets();
        }
    });

    // ฟังก์ชันตัดสินใจว่าจะ เพิ่มใหม่ หรือ อัปเดตข้อมูลเดิม
    function submitForm() {
        const name = document.getElementById("name").value.trim();
        const price = document.getElementById("price").value.trim();
        const description = document.getElementById("description").value.trim();
        const status = document.getElementById("status").value;
        const imagesInput = document.getElementById("images").value.trim();

        if(!name) { alert("กรุณากรอกชื่อพระเครื่อง"); return; }

        const imagesArray = imagesInput ? imagesInput.split(",").map(url => url.trim()) : [];

        const amuletData = {
            name: name,
            price: price,
            description: description,
            status: status,
            images: imagesArray
        };

        if (currentEditId === null) {
            // โหมดเพิ่มข้อมูลใหม่
            amuletData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            db.collection("amulets").add(amuletData)
            .then(() => {
                alert("เพิ่มข้อมูลพระเครื่องเรียบร้อยแล้ว!");
                resetForm();
                loadAmulets();
            })
            .catch(err => alert("เกิดข้อผิดพลาด: " + err.message));
        } else {
            // โหมดแก้ไขข้อมูลเดิม
            db.collection("amulets").doc(currentEditId).update(amuletData)
            .then(() => {
                alert("แก้ไขข้อมูลพระเครื่องเรียบร้อยแล้ว!");
                resetForm();
                loadAmulets();
            })
            .catch(err => alert("เกิดข้อผิดพลาดในการอัปเดต: " + err.message));
        }
    }

    // ฟังก์ชันดึงข้อมูลเดิมมาใส่ในฟอร์มเพื่อเตรียมแก้ไข
    function startEdit(id) {
        db.collection("amulets").doc(id).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                currentEditId = id; // บันทึก ID ที่กำลังแก้ไข

                // เอาข้อมูลเดิมไปใส่ในช่องกรอก
                document.getElementById("name").value = data.name || "";
                document.getElementById("price").value = data.price || "";
                document.getElementById("description").value = data.description || "";
                document.getElementById("status").value = data.status || "available";
                document.getElementById("images").value = data.images ? data.images.join(", ") : "";

                // เปลี่ยนข้อความบนหน้าฟอร์ม
                document.getElementById("formTitle").innerText = "✏️ แก้ไขข้อมูลพระเครื่อง";
                document.getElementById("submitBtn").innerText = "อัปเดตข้อมูลพระเครื่อง";
                document.getElementById("cancelBtn").style.display = "inline-block";

                // เลื่อนหน้าจอขึ้นไปที่ฟอร์มด้านบน
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }

    // ฟังก์ชันล้างฟอร์มกลับเป็นโหมดเพิ่มพระเครื่องปกติ
    function resetForm() {
        currentEditId = null;
        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        document.getElementById("images").value = "";
        document.getElementById("status").value = "available";

        document.getElementById("formTitle").innerText = "➕ เพิ่มพระเครื่ององค์ใหม่";
        document.getElementById("submitBtn").innerText = "บันทึกข้อมูลพระเครื่อง";
        document.getElementById("cancelBtn").style.display = "none";
    }

    function loadAmulets() {
        db.collection("amulets").orderBy("createdAt", "desc").get().then(querySnapshot => {
            const container = document.getElementById("listContainer");
            container.innerHTML = "";
            
            if(querySnapshot.empty) {
                container.innerHTML = "ยังไม่มีข้อมูลพระเครื่องในระบบ";
                return;
            }

            querySnapshot.forEach(doc => {
                const data = doc.data();
                const item = document.createElement("div");
                item.className = "amulet-item";
                item.innerHTML = `
                    <div>
                        <strong>${data.name}</strong> - ${data.price || 'ติดต่อสอบถาม'} บาท 
                        (${data.status === 'available' ? 'พร้อมเช่า' : 'ขายแล้ว'})
                    </div>
                    <div class="action-btns">
                        <button class="edit-btn" onclick="startEdit('${doc.id}')">แก้ไข</button>
                        <button class="delete-btn" onclick="deleteAmulet('${doc.id}')">ลบ</button>
                    </div>
                `;
                container.appendChild(item);
            });
        });
    }

    function deleteAmulet(id) {
        if(confirm("คุณต้องการลบพระเครื่ององค์นี้ใช่หรือไม่? ข้อมูลจะหายถาวร")) {
            db.collection("amulets").doc(id).delete().then(() => {
                alert("ลบข้อมูลสำเร็จ!");
                if(currentEditId === id) resetForm();
                loadAmulets();
            });
        }
    }

    function logout() {
        auth.signOut().then(() => window.location.href = "admin-login.html");
    }
</script>
</body>
</html>
