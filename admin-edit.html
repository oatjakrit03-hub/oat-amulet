<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดการพระเครื่อง | แอดมิน</title>
<style>
    body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    h2 { color: #d4af37; border-bottom: 1px solid #8b6b1f; padding-bottom: 10px; }
    .form-box { background: #262626; padding: 25px; border-radius: 12px; border: 1px solid #8b6b1f; margin-bottom: 30px; position: relative; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; background: #333; color: #fff; border: 1px solid #555; box-sizing: border-box;}
    button { background: #d4af37; color: #000; font-weight: bold; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #555; color: #aaa; cursor: not-allowed; }
    .logout-btn { background: #b30000; color: #fff; float: right; padding: 8px 15px; }
    .cancel-btn { background: #555; color: #fff; margin-left: 10px; display: none; }
    .amulet-list { background: #262626; padding: 20px; border-radius: 12px; }
    .amulet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #444; }
    .action-btns { display: flex; gap: 8px; }
    .edit-btn { background: #0084ff; color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
    .delete-btn { background: #b30000; color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
    .section-title { color: #caa74a; margin-top: 15px; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    <h2>ระบบแอดมินจัดการหลังบ้าน (โอ๊ต บางชัน)</h2>
    
    <div class="form-box">
        <h3 id="formTitle">➕ เพิ่มพระเครื่อง/ข้อมูลบัตร</h3>
        
        <div class="section-title">⚙️ เลือกประเภทการเพิ่มข้อมูล</div>
        <select id="dataType">
            <option value="forSale">พระเครื่องพร้อมเช่าบูชา (โชว์ที่หน้าร้าน)</option>
            <option value="certOnly">เฉพาะข้อมูลบัตรรับรอง (ไม่โชว์ที่หน้าร้าน)</option>
        </select>

        <div class="section-title">📌 ข้อมูลพระเครื่อง</div>
        <input type="text" id="name" placeholder="ชื่อพระเครื่อง">
        <input type="text" id="price" placeholder="ราคาเช่าบูชา (บาท)">
        <textarea id="description" rows="3" placeholder="รายละเอียด"></textarea>
        <select id="status">
            <option value="available">พร้อมเช่าบูชา</option>
            <option value="sold">มีผู้เช่าบูชาแล้ว</option>
        </select>
        
        <div class="section-title">🖼️ รูปภาพพระเครื่อง</div>
        <input type="file" id="imageFiles" accept="image/*" multiple>
        <input type="text" id="images" placeholder="หรือวางลิงก์รูปภาพ (แยกด้วย , )">

        <hr style="border: 0; border-top: 1px dashed #555; margin: 20px 0;">
        
        <div class="section-title">💳 ข้อมูลใบรับประกัน</div>
        <input type="text" id="certNo" placeholder="เลขรับประกัน (สำคัญมาก)">
        <input type="text" id="geji" placeholder="ชื่อหลวงพ่อ / เกจิ">
        <input type="text" id="wat" placeholder="วัด">
        <input type="text" id="pim" placeholder="พิมพ์พระ">
        <input type="text" id="nuea" placeholder="เนื้อพระ">
        <input type="text" id="certDate" placeholder="วันที่ออกบัตร">
        <input type="text" id="owner" placeholder="ชื่อเจ้าของพระ">
        
        <div class="section-title">🖼️ รูปภาพใบรับประกัน</div>
        <input type="file" id="certImageFile" accept="image/*">
        <input type="text" id="certImages" placeholder="หรือวางลิงก์รูปภาพใบรับประกัน">
        
        <br><br>
        <button id="submitBtn" onclick="submitForm()">บันทึกข้อมูลทั้งหมด</button>
        <button id="cancelBtn" class="cancel-btn" onclick="resetForm()">ยกเลิกการแก้ไข</button>
    </div>

    <div class="amulet-list">
        <h3>📋 รายการทั้งหมดในระบบ</h3>
        <div id="listContainer">กำลังโหลดข้อมูล...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const IMGBB_API_KEY = "7a5bd83f1fb6343d447b52fed843d826";
    const firebaseConfig = {
        apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
        authDomain: "oat-amulet-shop.firebaseapp.com",
        projectId: "oat-amulet-shop",
        storageBucket: "oat-amulet-shop.firebasestorage.app",
        messagingSenderId: "868077170885",
        appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
        measurementId: "G-GLR77H4VEH"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentEditId = null;

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
        const result = await response.json();
        return result.data.url;
    }

    async function submitForm() {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        
        try {
            const amuletData = {
                dataType: document.getElementById("dataType").value,
                name: document.getElementById("name").value,
                price: document.getElementById("price").value,
                description: document.getElementById("description").value,
                status: document.getElementById("status").value,
                certNo: document.getElementById("certNo").value.trim().toUpperCase(),
                geji: document.getElementById("geji").value,
                wat: document.getElementById("wat").value,
                pim: document.getElementById("pim").value,
                nuea: document.getElementById("nuea").value,
                certDate: document.getElementById("certDate").value,
                owner: document.getElementById("owner").value,
                images: document.getElementById("images").value.split(",").filter(s => s.trim() !== ""),
                certImages: document.getElementById("certImages").value.split(",").filter(s => s.trim() !== "")
            };

            // อัปโหลดไฟล์ถ้ามี
            if (document.getElementById("imageFiles").files.length > 0) {
                for (let file of document.getElementById("imageFiles").files) {
                    amuletData.images.push(await uploadToImgBB(file));
                }
            }
            if (document.getElementById("certImageFile").files[0]) {
                amuletData.certImages.push(await uploadToImgBB(document.getElementById("certImageFile").files[0]));
            }

            if (currentEditId === null) {
                amuletData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("amulets").add(amuletData);
            } else {
                await db.collection("amulets").doc(currentEditId).update(amuletData);
            }
            alert("บันทึกข้อมูลเรียบร้อย!");
            resetForm();
            loadAmulets();
        } catch (e) { alert("Error: " + e.message); }
        submitBtn.disabled = false;
    }

    function startEdit(id) {
        db.collection("amulets").doc(id).get().then(doc => {
            const data = doc.data();
            currentEditId = id;
            document.getElementById("dataType").value = data.dataType || "forSale";
            document.getElementById("name").value = data.name || "";
            document.getElementById("price").value = data.price || "";
            document.getElementById("description").value = data.description || "";
            document.getElementById("status").value = data.status || "available";
            document.getElementById("images").value = (data.images || []).join(",");
            document.getElementById("certNo").value = data.certNo || "";
            document.getElementById("geji").value = data.geji || "";
            document.getElementById("wat").value = data.wat || "";
            document.getElementById("pim").value = data.pim || "";
            document.getElementById("nuea").value = data.nuea || "";
            document.getElementById("certDate").value = data.certDate || "";
            document.getElementById("owner").value = data.owner || "";
            document.getElementById("certImages").value = (data.certImages || []).join(",");
            document.getElementById("submitBtn").innerText = "อัปเดตข้อมูล";
            document.getElementById("cancelBtn").style.display = "inline-block";
        });
    }

    function resetForm() {
        currentEditId = null;
        document.getElementById("submitBtn").innerText = "บันทึกข้อมูลทั้งหมด";
        document.getElementById("cancelBtn").style.display = "none";
        // ล้างค่าฟอร์ม...
    }

    function loadAmulets() {
        db.collection("amulets").orderBy("createdAt", "desc").get().then(snap => {
            const list = document.getElementById("listContainer");
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="amulet-item">
                    <div><strong>${d.name || 'ไม่มีชื่อ'}</strong> [${d.dataType === 'forSale' ? 'หน้าร้าน' : 'บัตรอย่างเดียว'}]</div>
                    <div class="action-btns"><button class="edit-btn" onclick="startEdit('${doc.id}')">แก้ไข</button>
                    <button class="delete-btn" onclick="db.collection('amulets').doc('${doc.id}').delete().then(() => loadAmulets())">ลบ</button></div>
                </div>`;
            });
        });
    }

    auth.onAuthStateChanged(user => { if (!user) window.location.href = "admin-login.html"; else loadAmulets(); });
    function logout() { auth.signOut(); }
</script>
</body>
</html>
