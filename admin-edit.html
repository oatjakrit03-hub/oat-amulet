<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>จัดการข้อมูลหลังบ้าน | โอ๊ต บางชัน</title>
    <!-- ... (สไตล์เดิมของคุณ) ... -->
</head>
<body>
    <!-- ... (HTML เดิมของคุณ) ... -->

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script>
        // เติมค่า Config ของคุณตรงนี้ให้ครบ
        const firebaseConfig = {
            apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
            authDomain: "oat-amulet-shop.firebaseapp.com",
            projectId: "oat-amulet-shop",
            storageBucket: "oat-amulet-shop.firebasestorage.app",
            messagingSenderId: "868077170885",
            appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
            measurementId: "G-GLR77H4VEH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ตรวจสอบสถานะการเข้าสู่ระบบ
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
                window.location.href = "admin-login.html";
            }
        });

        function saveData() {
            const imagesArray = [
                document.getElementById("img1").value,
                document.getElementById("img2").value,
                document.getElementById("img3").value,
                document.getElementById("img4").value
            ].filter(url => url !== "");

            const data = {
                dataType: document.getElementById("dataType").value,
                name: document.getElementById("name").value,
                description: document.getElementById("description").value,
                certNo: document.getElementById("certNo").value.trim().toUpperCase(),
                geji: document.getElementById("geji").value,
                wat: document.getElementById("wat").value,
                images: imagesArray,
                certImages: imagesArray, // แก้ไขให้ใช้รูปชุดเดียวกันกับข้อมูลทั่วไป
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection("amulets").add(data)
            .then(() => { alert("บันทึกสำเร็จ!"); location.reload(); })
            .catch(err => alert("เกิดข้อผิดพลาด: " + err.message));
        }
    </script>
</body>
</html>
