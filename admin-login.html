<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | โอ๊ต บางชัน AMULET</title>
<style>
    body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-box { background: #222; padding: 40px; border-radius: 15px; border: 1px solid #8b6b1f; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
    h2 { color: #d4af37; margin-bottom: 25px; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #555; background: #333; color: #fff; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: linear-gradient(180deg,#fff3b0,#d4af37,#9b7610); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; color: #000;}
    button:hover { transform: scale(1.02); }
    /* สไตล์ปุ่มกลับหน้าแรก */
    .back-btn { margin-top: 20px; display: inline-block; color: #d4af37; text-decoration: none; font-size: 14px; }
    .back-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-box">
    <h2>แอดมินเข้าสู่ระบบ</h2>
    <input type="email" id="email" placeholder="อีเมลแอดมิน">
    <input type="password" id="password" placeholder="รหัสผ่าน">
    <button onclick="login()">เข้าสู่ระบบ</button>
    
    <!-- เพิ่มปุ่มกลับหน้าแรกตรงนี้ -->
    <a href="index.html" class="back-btn">⬅️ กลับไปหน้าแรก</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
        authDomain: "oat-amulet-shop.firebaseapp.com",
        projectId: "oat-amulet-shop",
        storageBucket: "oat-amulet-shop.firebasestorage.app",
        messagingSenderId: "868077170885",
        appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
        measurementId: "G-GLR77H4VEH"
    };
    firebase.initializeApp(firebaseConfig);

    function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        
        firebase.auth().signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            alert("เข้าสู่ระบบสำเร็จ!");
            window.location.href = "admin-edit.html";
        })
        .catch((error) => {
            alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง: " + error.message);
        });
    }
</script>
</body>
</html>
