<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#111;
    color:#fff;
    padding:20px;
}
input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
}
button{
    padding:10px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
.card{
    background:#1c1c1c;
    border:1px solid gold;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<a href="amulet.html" style="color:gold;">⬅ กลับหน้าเว็บ</a>

<hr>

<h3>➕ เพิ่มพระ</h3>

<input id="title" placeholder="ชื่อพระ">
<input id="img" placeholder="ลิงก์รูปภาพ">

<select id="status">
    <option value="available">พร้อมเช่า</option>
    <option value="sold">ขายแล้ว</option>
</select>

<button onclick="addAmulet()">เพิ่มพระ</button>

<hr>

<h3>รายการพระ</h3>
<div id="list"></div>

<script>

// กันคนไม่ login
if(localStorage.getItem("admin") !== "true"){
    window.location.href = "login.html";
}

// โหลดข้อมูล
let data = JSON.parse(localStorage.getItem("amulet") || "{}");

// แสดงรายการ
function render(){
    let list = document.getElementById("list");
    list.innerHTML = "";

    for(let id in data){
        list.innerHTML += `
        <div class="card">
            <b>${data[id].title}</b><br><br>
            <button onclick="deleteItem('${id}')">🗑️ ลบ</button>
        </div>
        `;
    }
}

// เพิ่มพระ
function addAmulet(){

    let id = "p" + Date.now();

    data[id] = {
        title: document.getElementById("title").value,
        img: document.getElementById("img").value,
        status: document.getElementById("status").value
    };

    localStorage.setItem("amulet", JSON.stringify(data));

    render();
}

// ลบพระ
function deleteItem(id){

    if(confirm("ต้องการลบพระองค์นี้ใช่ไหม?")){
        delete data[id];
        localStorage.setItem("amulet", JSON.stringify(data));
        render();
    }
}

render();

</script>

</body>
</html>
