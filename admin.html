<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin - เพิ่มพระ</title>

<style>
body{
    font-family:Tahoma;
    background:#111;
    color:#fff;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    padding:12px;
    width:100%;
    background:gold;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.box{
    max-width:600px;
    margin:auto;
}

.logout{
    position:fixed;
    top:10px;
    right:10px;
    background:red;
    color:#fff;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔐 กันคนไม่ login เข้า -->
<script>
if(localStorage.getItem("adminLogin") !== "true"){
    window.location.href = "login.html";
}
</script>

<!-- 🔴 ปุ่มออกจากระบบ -->
<button class="logout" onclick="logout()">ออกจากระบบ</button>

<div class="box">
<h2>➕ เพิ่มข้อมูลพระ</h2>

<input id="title" placeholder="ชื่อพระ">

<textarea id="desc" placeholder="รายละเอียด (ใส่ได้หลายบรรทัด)"></textarea>

<textarea id="imgs" placeholder="ลิงก์รูป (1 บรรทัด = 1 รูป)"></textarea>

<input id="fb" placeholder="ลิงก์ Facebook">

<button onclick="save()">บันทึก</button>
</div>

<script>

// =======================
// logout
// =======================
function logout(){
    localStorage.removeItem("adminLogin");
    window.location.href = "login.html";
}

// =======================
// save data
// =======================
function save(){

    let title = document.getElementById("title").value.trim();
    let desc = document.getElementById("desc").value.trim();
    let fb = document.getElementById("fb").value.trim();

    let imgs = document.getElementById("imgs").value
        .split("\n")
        .map(x => x.trim())
        .filter(x => x !== "");

    if(title === ""){
        alert("กรุณาใส่ชื่อพระ");
        return;
    }

    if(imgs.length === 0){
        alert("กรุณาใส่รูปอย่างน้อย 1 รูป");
        return;
    }

    let id = "p" + Date.now();

    let data = JSON.parse(localStorage.getItem("amulet") || "{}");

    data[id] = {
        title,
        desc,
        imgs,
        fb
    };

    localStorage.setItem("amulet", JSON.stringify(data));

    alert("บันทึกสำเร็จ!");

   window.location.href = "amulet.html";
}
</script>

</body>
</html>
