<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>พระเครื่องพร้อมเช่าบูชา | โอ๊ต บางชัน AMULET</title>

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:radial-gradient(circle at top,#2a2a2a,#000);
    color:#fff;
}

/* Header */
header{
    background:linear-gradient(180deg,#000,#151515,#000);
    text-align:center;
    padding:25px 20px;
    border-bottom:2px solid #caa74a;
}

.logo{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
}

h1{color:#d4af37;margin-top:15px;margin-bottom:10px;}
.subtitle{color:#ddd;}

/* Menu */
.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    background:#111;
    padding:12px;
    border-top:1px solid #8b6b1f;
    border-bottom:1px solid #8b6b1f;
}

.menu a{
    text-decoration:none;
    color:#000;
    background:linear-gradient(180deg,#fff3b0,#d4af37,#9b7610);
    padding:10px 20px;
    border-radius:10px;
    font-weight:bold;
}

/* Content */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.title{text-align:center;color:#d4af37;margin-bottom:40px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:#1b1b1b;
    border:1px solid #8b6b1f;
    border-radius:20px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(212,175,55,.3);
}

.card img{
    width:100%;
    height: 250px;
    object-fit: cover;
    border-radius:15px;
    margin-bottom:20px;
}

.card h3{color:#d4af37; margin: 10px 0; font-size: 18px;}

.status{
    display:inline-block;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    margin-top:10px;
}

.available{background:#0f8c2d;}
.sold{background:#b30000;}

footer{
    margin-top:60px;
    text-align:center;
    padding:25px;
    border-top:1px solid #8b6b1f;
    color:#ccc;
}

.loading-text {
    text-align: center;
    font-size: 20px;
    color: #d4af37;
    grid-column: 1 / -1;
    padding: 50px 0;
}

</style>

</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/logo.png" class="logo">
<h1>ร้านพระเครื่อง โอ๊ต บางชัน AMULET</h1>
<p class="subtitle">พระเครื่องพร้อมเช่าบูชา</p>
</header>

<nav class="menu">
<a href="index.html">หน้าแรก</a>
<a href="amulet.html">พระเครื่องพร้อมเช่าบูชา</a>
<a href="about.html">เกี่ยวกับร้านและการรับประกัน</a>
</nav>

<div class="container">

<h2 class="title">พระเครื่องพร้อมเช่าบูชา</h2>

<div class="grid" id="amuletGridContainer">
    <div class="loading-text">กำลังโหลดข้อมูลพระเครื่องจากระบบหลังบ้าน...</div>
</div>
</div>

<footer>
Facebook : ร้านพระเครื่อง โอ๊ต บางชัน AMULET<br><br>
Line ID : jakrit39
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // เชื่อมต่อระบบ Firebase ของคุณโอ๊ตเรียบร้อยแล้วครับ
    const firebaseConfig = {
        apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
        authDomain: "oat-amulet-shop.firebaseapp.com",
        projectId: "oat-amulet-shop",
        storageBucket: "oat-amulet-shop.firebasestorage.app",
        messagingSenderId: "868077170885",
        appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
        measurementId: "G-GLR77H4VEH"
    };

    // เริ่มต้นใช้งาน Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ดึงข้อมูลรายการพระเครื่องทั้งหมดจาก Firestore เรียงตามเพิ่งเพิ่มล่าสุด
    db.collection("amulets").orderBy("createdAt", "desc").get().then((querySnapshot) => {
        const grid = document.getElementById("amuletGridContainer");
        grid.innerHTML = ""; 

        if (querySnapshot.empty) {
            grid.innerHTML = '<div class="loading-text">ขณะนี้ยังไม่มีรายการพระเครื่องในระบบหลังบ้าน</div>';
            return;
        }

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            
            // ดึงภาพแรกมาแสดง ถ้าไม่มีภาพให้ใช้โลโก้แทน
            const mainImg = (data.images && data.images.length > 0) ? data.images[0] : 'https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/logo.png';
            
            let statusText = data.status === "available" ? "🟢 พร้อมเช่าบูชา" : "🔴 มีผู้เช่าบูชาแล้ว";
            let statusClass = data.status === "available" ? "available" : "sold";

            const card = document.createElement("div");
            card.className = "card";
            
            // คลิกการ์ดแล้วส่ง ID ไปแสดงข้อมูลเชิงลึกที่หน้า detail.html
            card.onclick = function() {
                window.location.href = `detail.html?id=${doc.id}`;
            };

            card.innerHTML = `
                <img src="${mainImg}" alt="${data.name}">
                <h3>${data.name}</h3>
                <div class="status ${statusClass}">${statusText}</div>
            `;

            grid.appendChild(card);
        });
    }).catch((error) => {
        console.error("Error fetching amulets: ", error);
        document.getElementById("amuletGridContainer").innerHTML = '<div class="loading-text" style="color:#ff8080;">เกิดข้อผิดพลาดในการดึงข้อมูลจากฐานข้อมูล</div>';
    });
</script>

</body>
</html>
