<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พระเครื่องพร้อมเช่าบูชา</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#111;
    color:#fff;
}

header{
    text-align:center;
    padding:20px;
    background:#000;
    border-bottom:2px solid gold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    border:1px solid gold;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{transform:scale(1.03)}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    font-size:16px;
}

.status{
    padding:10px;
    text-align:center;
    font-weight:bold;
}

.available{color:#00ff7f}
.sold{color:#ff4d4d}

.add-btn{
    display:block;
    text-align:center;
    margin:15px;
    padding:12px;
    background:gold;
    color:#000;
    font-weight:bold;
    text-decoration:none;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>ร้านพระเครื่อง โอ๊ต บางชัน AMULET</h2>
</header>

<a class="add-btn" href="admin.html">➕ เพิ่มพระใหม่</a>

<div class="grid" id="grid"></div>

<script>

// ===============================
// 1. ดึงข้อมูลจาก localStorage
// ===============================
let data = JSON.parse(localStorage.getItem("amulet") || "{}");

// ===============================
// 2. fallback ถ้ายังไม่มีข้อมูล
// ===============================
if(Object.keys(data).length === 0){
    data = {
        p1:{
            title:"เหรียญรุ่นพ่อครัว",
            img:"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/1.jpg",
            status:"available"
        },
        p2:{
            title:"เหรียญแม่ทัพ",
            img:"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/2.jpg",
            status:"available"
        },
        p3:{
            title:"เหรียญโบสถ์ลั่น",
            img:"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/3.jpg",
            status:"sold"
        }
    };
}

// ===============================
// 3. render การ์ด
// ===============================
const grid = document.getElementById("grid");

for(let id in data){

    let item = data[id];

    let img = item.imgs ? item.imgs[0] : item.img;
    let title = item.title || "ไม่มีชื่อ";
    let status = item.status || "available";

    let statusText = status === "sold" ? "ขายแล้ว" : "พร้อมเช่า";
    let statusClass = status === "sold" ? "sold" : "available";

    let card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
        window.location.href = "detail.html?id=" + id;
    };

    card.innerHTML = `
        <img src="${img}">
        <h3>${title}</h3>
        <div class="status ${statusClass}">${statusText}</div>
    `;

    grid.appendChild(card);
}

</script>

</body>
</html>
