<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พระเครื่องพร้อมเช่าบูชา | โอ๊ต บางชัน AMULET</title>
<style>
    *{box-sizing:border-box;}
    body{ margin:0; font-family:Tahoma,sans-serif; background:radial-gradient(circle at top,#2a2a2a,#000); color:#fff; }
    header{ background:linear-gradient(180deg,#000,#151515,#000); text-align:center; padding:35px 20px; border-bottom:2px solid #caa74a; }
    
    /* 🛠️ ปรับแต่งโลโก้ให้ใหญ่ขึ้น เด่นขึ้น และชัดขึ้นตรงนี้ครับคุณโอ๊ต */
    .logo { 
        width: 240px;          /* ขยายความกว้างจาก 180px เป็น 240px */
        height: 240px;         /* ขยายความสูงจาก 180px เป็น 240px */
        border-radius: 50%; 
        object-fit: cover; 
        border: 3px solid #d4af37; /* เพิ่มขอบทองหนาขึ้นเล็กน้อยเพิ่มความคม */
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); /* เพิ่มเงาเรืองแสงสีทองให้โลโก้ดูคมชัดลอยเด่นขึ้น */
        transition: transform 0.3s ease;
    }
    .logo:hover {
        transform: scale(1.03); /* เวลาเอาเมาส์วางจะขยายใหญ่ขึ้นนิดหน่อยดูมีลูกเล่นครับ */
    }

    h1{color:#d4af37;margin-top:20px;margin-bottom:10px;}
    .subtitle{color:#ddd;}
    .menu{ display:flex; justify-content:center; flex-wrap:wrap; gap:15px; background:#111; padding:12px; border-top:1px solid #8b6b1f; border-bottom:1px solid #8b6b1f; }
    .menu a{ text-decoration:none; color:#000; background:linear-gradient(180deg,#fff3b0,#d4af37,#9b7610); padding:10px 20px; border-radius:10px; font-weight:bold; }
    .container{ max-width:1200px; margin:auto; padding:40px 20px; }
    .title{text-align:center;color:#d4af37;margin-bottom:40px;}
    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:25px; }
    .card{ background:#1b1b1b; border:1px solid #8b6b1f; border-radius:20px; padding:20px; text-align:center; cursor:pointer; transition:.3s; display: flex; flex-direction: column; justify-content: space-between; }
    .card:hover{ transform:translateY(-5px); box-shadow:0 0 20px rgba(212,175,55,.3); }
    .card img{ width:100%; height: 300px; object-fit: contain; background: #0a0a0a; border-radius:15px; margin-bottom:15px; border: 1px solid #2a2a2a; }
    .card h3{ color:#d4af37; margin: 10px 0; font-size: 18px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 44px; }
    .status{ display:inline-block; padding:8px 18px; border-radius:20px; font-weight:bold; margin-top:auto; font-size: 14px; }
    .available{background:#0f8c2d;}
    .sold{background:#b30000;}
    footer{ margin-top:60px; text-align:center; padding:25px; border-top:1px solid #8b6b1f; color:#ccc; }
    .loading-text { text-align: center; font-size: 20px; color: #d4af37; grid-column: 1 / -1; padding: 50px 0; }

    /* ปรับขนาดโลโก้บนมือถือไม่ให้ล้นจอ */
    @media(max-width: 480px){
        .logo {
            width: 180px;
            height: 180px;
        }
    }
</style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/logo.png" class="logo">
    <h1>ร้านพระเครื่อง โอ๊ต บางชัน AMULET</h1>
    <p class="subtitle"></p>
</header>

<nav class="menu">
    <a href="index.html">หน้าแรก</a>
    <a href="amulet.html">พระเครื่องพร้อมเช่าบูชา</a>
    <a href="check.html">ตรวจสอบใบรับประกัน</a>
    <a href="about.html">เงื่อนไขการรับประกัน</a>
</nav>

<div class="container">
    <h2 class="title">พระเครื่องพร้อมเช่าบูชา</h2>
    <div class="grid" id="amuletGridContainer">
        <div class="loading-text">กำลังโหลดข้อมูล...</div>
    </div>
</div>

<footer>
    Facebook : ร้านพระเครื่อง โอ๊ต บางชัน AMULET<br><br>
    Line ID : jakrit39<br><br>
    <a href="admin-login.html" style="color: #8b6b1f; text-decoration: none; font-size: 13px;">🔒 สำหรับผู้ดูแลระบบ</a>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
        authDomain: "oat-amulet-shop.firebaseapp.com",
        projectId: "oat-amulet-shop",
        storageBucket: "oat-amulet-shop.firebasestorage.app",
        messagingSenderId: "868077170885",
        appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
        measurementId: "G-GLR77H4VEH"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("amulets")
      .where("dataType", "==", "forSale")
      .orderBy("createdAt", "desc")
      .get()
      .then((querySnapshot) => {
        const grid = document.getElementById("amuletGridContainer");
        grid.innerHTML = ""; 

        if (querySnapshot.empty) {
            grid.innerHTML = '<div class="loading-text">ยังไม่มีรายการพระเครื่องพร้อมเช่าบูชาในขณะนี้</div>';
            return;
        }

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const status = data.status || "available"; 
            const mainImg = (data.images && data.images.length > 0) ? data.images[0] : 'https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/logo.png';
            let statusText = status === "available" ? "🟢 พร้อมเช่าบูชา" : "🔴 มีผู้เช่าบูชาแล้ว";
            let statusClass = status === "available" ? "available" : "sold";

            const card = document.createElement("div");
            card.className = "card";
            card.onclick = () => window.location.href = `detail.html?id=${doc.id}`;
            card.innerHTML = `
                <img src="${mainImg}" alt="${data.name || 'ไม่มีชื่อพระ'}">
                <h3>${data.name || 'ไม่มีชื่อพระ'}</h3>
                <div class="status ${statusClass}">${statusText}</div>
            `;
            grid.appendChild(card);
        });
    }).catch((err) => {
        console.error("Firebase Error:", err);
        document.getElementById("amuletGridContainer").innerHTML = '<div class="loading-text">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
    });
</script>
</body>
</html>
