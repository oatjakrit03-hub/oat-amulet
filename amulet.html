<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พระเครื่องพร้อมเช่าบูชา</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#111;
    color:#fff;
}

header{
    text-align:center;
    padding:20px;
    background:#000;
    border-bottom:2px solid gold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1c1c1c;
    border:1px solid gold;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{transform:scale(1.03)}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    font-size:16px;
}

.status{
    padding:10px;
    text-align:center;
    font-weight:bold;
}

.available{color:#00ff7f}
.sold{color:#ff4d4d}
</style>
</head>

<body>

<header>
<h2>ร้านพระเครื่อง โอ๊ต บางชัน AMULET</h2>
</header>

<div class="grid">

<div class="card" onclick="goDetail('p1')">
<img src="https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/1.jpg">
<h3>เหรียญรุ่นพ่อครัว</h3>
<div class="status available">พร้อมเช่า</div>
</div>

<div class="card" onclick="goDetail('p2')">
<img src="https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/2.jpg">
<h3>เหรียญแม่ทัพ</h3>
<div class="status available">พร้อมเช่า</div>
</div>

<div class="card" onclick="goDetail('p3')">
<img src="https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/3.jpg">
<h3>เหรียญโบสถ์ลั่น</h3>
<div class="status sold">ขายแล้ว</div>
</div>

</div>

<script>
function goDetail(id){
    window.location.href = "detail.html?id=" + id;
}
</script>

</body>
</html>
