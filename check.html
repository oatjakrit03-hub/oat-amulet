<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบใบรับประกันพระเครื่อง - OAT AMULET</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #333; text-align: center; box-sizing: border-box; }
        h1 { color: #d4af37; margin-bottom: 25px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        input[type="text"] { padding: 12px 20px; font-size: 16px; border: 2px solid #333; border-radius: 25px; background: #2a2a2a; color: #fff; width: 60%; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #d4af37; }
        button { padding: 12px 25px; font-size: 16px; background: #d4af37; color: #121212; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: transform 0.2s, background 0.3s; }
        button:hover { background: #f1c40f; transform: scale(1.05); }
        #result { margin-top: 20px; text-align: left; }
        .result-layout { display: flex; flex-direction: column; gap: 20px; align-items: center; background: #252525; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        .result-info p { margin: 10px 0; font-size: 16px; line-height: 1.5; }
        .result-info b { color: #d4af37; }
        
        /* สไตล์ของ Thumbnails เพิ่มเติมในระบบใบรับประกัน */
        .cert-thumb-container { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .cert-thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #8b6b1f; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .cert-thumb-img:hover, .cert-thumb-img.active { opacity: 1; border-color: #d4af37; }
        .img-count { font-size: 13px; color: #aaa; margin-top: 5px; }

        .lightbox { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .lightbox.show { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 ระบบตรวจสอบใบรับประกันพระเครื่อง</h1>
        <div class="search-box">
            <input type="text" id="certNo" placeholder="กรอกเลขบัตร เช่น OBC-0000">
            <button onclick="searchCert()">ค้นหาข้อมูล</button>
        </div>
        <div id="result"></div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="ขยายรูป">
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
        authDomain: "oat-amulet-shop.firebaseapp.com",
        projectId: "oat-amulet-shop",
        storageBucket: "oat-amulet-shop.firebasestorage.app",
        messagingSenderId: "868077170885",
        appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
        measurementId: "G-GLR77H4VEH"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentSlides = [];
    let currentSlideIndex = 0;

    async function searchCert() {
        const certInput = document.getElementById('certNo').value.trim().toUpperCase();
        const resultDiv = document.getElementById('result');

        if (!certInput) {
            resultDiv.innerHTML = '<p style="text-align:center; color:#ff8080;">กรุณากรอกเลขรับประกัน</p>';
            return;
        }

        resultDiv.innerHTML = '<p style="text-align:center;">กำลังค้นหา...</p>';

        try {
            const querySnapshot = await db.collection("amulets")
                .where("certNo", "==", certInput)
                .where("dataType", "==", "certificate")
                .get();

            if (!querySnapshot.empty) {
                const data = querySnapshot.docs[0].data();
                currentSlides = data.images || [];
                currentSlideIndex = 0;

                // สร้าง HTML ของ Thumbnails และข้อมูลรูปทั้งหมดที่มี
                let thumbsHtml = '';
                if(currentSlides.length > 0) {
                    thumbsHtml = `<div class="cert-thumb-container">`;
                    currentSlides.forEach((img, index) => {
                        thumbsHtml += `<img src="${img}" class="cert-thumb-img ${index === 0 ? 'active' : ''}" onclick="selectSlide(${index})" alt="รูปย่อที่ ${index+1}">`;
                    });
                    thumbsHtml += `</div><div class="img-count">(มีรูปภาพทั้งหมด ${currentSlides.length} รูป)</div>`;
                }

                let imageSectionHtml = currentSlides.length > 0 ? `
                    <div style="text-align:center; margin-top:15px; width: 100%;">
                        <img id="certSlideImg" src="${currentSlides[0]}" onclick="openLightbox(this.src)" style="width:100%; max-width:400px; border-radius:10px; border:2px solid #d4af37; cursor:pointer;">
                        ${currentSlides.length > 1 ? `
                            <br><button onclick="changeSlide(-1)" style="padding:5px 15px; margin:5px; font-size:12px;">❮</button>
                            <button onclick="changeSlide(1)" style="padding:5px 15px; margin:5px; font-size:12px;">❯</button>
                        ` : ''}
                        ${thumbsHtml}
                    </div>
                ` : '';

                resultDiv.innerHTML = `
                <div class="result-layout">
                    <h3 style="color:#d4af37;">✓ ข้อมูลใบรับประกันแท้</h3>
                    <div class="result-info" style="width: 100%;">
                        <p><b>เลขรับประกัน :</b> ${data.certNo || '-'}</p>
                        <p><b>เกจิ / อาจารย์ :</b> ${data.geji || '-'}</p>
                        <p><b>วัด :</b> ${data.wat || '-'}</p>
                        <p><b>พิมพ์พระ :</b> ${data.pim || '-'}</p>
                        <p><b>เนื้อพระ :</b> ${data.nuea || '-'}</p>
                        <p><b>วันที่ออกบัตร :</b> ${data.certDate || '-'}</p>
                        <p><b>ชื่อเจ้าของพระ :</b> ${data.owner || '-'}</p>
                        <p><b>ราคาเช่าบูชา :</b> ${data.price || '-'} บาท</p>
                    </div>
                    ${imageSectionHtml}
                </div>`;
            } else {
                resultDiv.innerHTML = `<p style="text-align:center; color:#ff8080;">ไม่พบข้อมูลเลขรับประกันนี้</p>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<p style="text-align:center; color:#ff8080;">เกิดข้อผิดพลาดในการค้นหา</p>';
        }
    }

    window.changeSlide = function(direction) {
        currentSlideIndex = (currentSlideIndex + direction + currentSlides.length) % currentSlides.length;
        updateSlideDisplay();
    }

    window.selectSlide = function(index) {
        currentSlideIndex = index;
        updateSlideDisplay();
    }

    function updateSlideDisplay() {
        document.getElementById('certSlideImg').src = currentSlides[currentSlideIndex];
        const thumbs = document.querySelectorAll('.cert-thumb-img');
        thumbs.forEach((thumb, idx) => {
            if(idx === currentSlideIndex) {
                thumb.classList.add('active');
            } else {
                thumb.classList.remove('active');
            }
        });
    }

    function openLightbox(src){ document.getElementById("lightbox-img").src = src; document.getElementById("lightbox").classList.add("show"); }
    function closeLightbox(){ document.getElementById("lightbox").classList.remove("show"); }
    </script>
</body>
</html>
