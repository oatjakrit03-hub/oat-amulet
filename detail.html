<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดพระ</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#0f0f0f;
    color:#fff;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.main-img{
    width:100%;
    border-radius:15px;
    cursor:zoom-in;
}

.thumb{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.thumb img{
    width:80px;
    height:80px;
    object-fit:cover;
    cursor:pointer;
    border-radius:10px;
    border:2px solid gold;
}

.box{
    margin-top:20px;
    padding:15px;
    background:#1c1c1c;
    border-radius:10px;
}

.btn{
    display:block;
    text-align:center;
    margin-top:20px;
    padding:15px;
    background:#1877f2;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

/* zoom */
.zoom{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
}

.zoom img{
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">รายละเอียดพระ</h2>

<img id="mainImg" class="main-img" onclick="openZoom()" src="">

<div class="thumb" id="thumbs"></div>

<div class="box">
<p>รายละเอียดพระเครื่องจะแสดงตรงนี้</p>
</div>

<a class="btn" id="fbBtn" target="_blank">💬 สอบถาม Facebook</a>

</div>

<div class="zoom" id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>
const data = {
p1:{
title:"เหรียญพ่อครัว",
imgs:[
"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/1.jpg",
"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/2.jpg"
],
fb:"https://www.facebook.com/jakrit.hanphanoen"
},
p2:{
title:"เหรียญแม่ทัพ",
imgs:[
"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/2.jpg",
"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/3.jpg"
],
fb:"https://www.facebook.com/jakrit.hanphanoen"
},
p3:{
title:"เหรียญโบสถ์ลั่น",
imgs:[
"https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/3.jpg"
],
fb:"https://www.facebook.com/jakrit.hanphanoen"
}
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const item = data[id];

if(item){
document.getElementById("title").innerText = item.title;
document.getElementById("mainImg").src = item.imgs[0];
document.getElementById("fbBtn").href = item.fb;

let thumbs = document.getElementById("thumbs");

item.imgs.forEach(img=>{
let el = document.createElement("img");
el.src = img;
el.onclick = ()=>document.getElementById("mainImg").src = img;
thumbs.appendChild(el);
});
}

function openZoom(){
document.getElementById("zoom").style.display="flex";
document.getElementById("zoomImg").src =
document.getElementById("mainImg").src;
}

function closeZoom(){
document.getElementById("zoom").style.display="none";
}
</script>

</body>
</html>
