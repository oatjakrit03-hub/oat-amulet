<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดพระ</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#0f0f0f;
    color:#fff;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.main-img{
    width:100%;
    border-radius:15px;
    cursor:zoom-in;
}

.thumb{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.thumb img{
    width:80px;
    height:80px;
    object-fit:cover;
    cursor:pointer;
    border-radius:10px;
    border:2px solid gold;
}

.box{
    margin-top:20px;
    padding:15px;
    background:#1c1c1c;
    border-radius:10px;
    line-height:1.8;
    white-space:pre-line;
}

.btn{
    display:block;
    text-align:center;
    margin-top:20px;
    padding:15px;
    background:#1877f2;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.zoom{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
}

.zoom img{
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">ไม่พบข้อมูลพระ</h2>

<img id="mainImg" class="main-img" onclick="openZoom()" src="">

<div class="thumb" id="thumbs"></div>

<div class="box" id="descBox">
กำลังโหลดข้อมูล...
</div>

<a class="btn" id="fbBtn" target="_blank">💬 สอบถาม Facebook</a>

</div>

<div class="zoom" id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>
// โหลดข้อมูลจาก localStorage
let data = JSON.parse(localStorage.getItem("amulet") || "{}");

// ถ้ายังไม่มีข้อมูลใน localStorage ให้ใช้ข้อมูลตัวอย่างเดิม
if (Object.keys(data).length === 0) {
    data = {
        p1:{
            title:"เหรียญพ่อครัว",
            imgs:[
                "https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/refs/heads/main/images/%E0%B8%9E%E0%B9%88%E0%B8%AD%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B8%A7%E0%B8%AB%E0%B8%99%E0%B9%89%E0%B8%B2.jpeg",
                "https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/refs/heads/main/images/%E0%B8%9E%E0%B9%88%E0%B8%AD%E0%B8%84%E0%B8%A3%E0%B8%B1%E0%B8%A7%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%87.jpeg"
            ],
            desc:`เหรียญแจกพ่อครัว หลวงพ่อแดง วัดเขาบันไดอิฐ
เนื้ออัลปก้า
รายละเอียด:
-รางวัลที่1 งานราชบุรี 2569
-จำนวนการจัดสร้าง 750 เหรียญ
- สภาพ:พระสวย ผิวเดิม 
- เหมาะสำหรับผู้ที่กำลังมองหาพระไว้สะสม`,
            fb:"https://www.facebook.com/jakrit.hanphanoen"
        },

        p2:{
            title:"เหรียญแม่ทัพ",
            imgs:[
                "https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/refs/heads/main/images/%E0%B9%81%E0%B8%A1%E0%B9%88%E0%B8%97%E0%B8%B1%E0%B8%9E%E0%B9%84%E0%B8%A3%E0%B9%89%E0%B8%94%E0%B8%B2%E0%B8%A7%20%E0%B8%AB%E0%B8%99%E0%B9%89%E0%B8%B2.jpeg",
                "https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/refs/heads/main/images/%E0%B9%81%E0%B8%A1%E0%B9%88%E0%B8%97%E0%B8%B1%E0%B8%9E%E0%B9%84%E0%B8%A3%E0%B9%89%E0%B8%94%E0%B8%B2%E0%B8%A7%20%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%87.jpeg"
            ],
            desc:`เหรียญแม่ทัพ หลวงพ่อแดง วัดเขาบันไดอิฐ บล็อกไร้ดาว วาระแรก 
            เนื้อ ทองแดงรมดำ
-รางวัลที่1 งานราชบุรี 2569
- รุ่นวาระตำนานปืนแตก เป็นเหรียญอีกหนึ่งรุ่นที่เป็นเหรียญยอดนิยมของหลวงพ่อแดง เนื่องจากปลุกเสกเสร็จแล้วมีคนได้นำไปลองยิงแล้วปรากฏว่าปืนแตก เมื่อชาวบ้านรู้รีบมาบูชาภายใน1วันทำให้คนบูชาจนหมด
- สภาพ:พระสวย ผิวเดิม
- เหมาะสำหรับผู้ที่กำลังมองหาพระไว้สะสม`,
            fb:"https://www.facebook.com/jakrit.hanphanoen"
        },

        p3:{
            title:"เหรียญโบสถ์ลั่น",
            imgs:[
                "https://raw.githubusercontent.com/oatjakrit03-hub/oat-amulet/main/images/3.jpg"
            ],
            desc:`เหรียญโบสถ์ลั่น

รายละเอียดเพิ่มเติม:
- รุ่นยอดนิยม
- พิธีปลุกเสกเข้มขลัง`,
            fb:"https://www.facebook.com/jakrit.hanphanoen"
        }
    };
}

// ===== ดึง id จาก URL =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const item = data[id];

// ===== ถ้ามีข้อมูล =====
if(item){
    document.getElementById("title").innerText = item.title;

    const mainImg = document.getElementById("mainImg");
    mainImg.src = item.imgs?.[0] || "";

    document.getElementById("fbBtn").href = item.fb || "#";

    document.getElementById("descBox").innerText = item.desc || "ไม่มีรายละเอียด";

    const thumbs = document.getElementById("thumbs");
    thumbs.innerHTML = "";

    (item.imgs || []).forEach(img=>{
        let el = document.createElement("img");
        el.src = img;
        el.onclick = ()=> mainImg.src = img;
        thumbs.appendChild(el);
    });

}else{
    document.getElementById("descBox").innerText = "ไม่พบข้อมูลพระองค์นี้";
}

// ===== zoom =====
function openZoom(){
    document.getElementById("zoom").style.display="flex";
    document.getElementById("zoomImg").src =
    document.getElementById("mainImg").src;
}

function closeZoom(){
    document.getElementById("zoom").style.display="none";
}
</script>

</body>
</html>
