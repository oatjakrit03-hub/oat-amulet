```html
<div class="search-box">
    <h2>ค้นหาเลขรับประกัน</h2>

    <input type="text" id="certNo"
           placeholder="เช่น OBA-000001">

    <button onclick="searchCert()">ค้นหา</button>

    <div id="result" style="margin-top:20px"></div>
</div>

<script>
const csvUrl =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9003I_DGkUhx1z3ajec368wXSWvy2_ECpxSBT8cgNi4cPWyuR4QmJwidYZ7oiv2k-V8JUP0ue9Un6/pub?gid=0&single=true&output=csv';

async function searchCert(){
    const cert =
      document.getElementById('certNo').value.trim();

    const result =
      document.getElementById('result');

    try{
        const res = await fetch(csvUrl);
        const text = await res.text();

        const rows =
          text.trim().split('\n').map(r => r.split(','));

        const data = rows.slice(1);

        const item = data.find(
          r => r[0].trim() === cert
        );

        if(item){
            result.innerHTML = `
                <h3 style="color:#d4af37">
                    ✓ รับประกันแท้จากทางร้าน
                </h3>
                <p><b>เลขรับประกัน:</b> ${item[0]}</p>
                <p><b>ชื่อพระ:</b> ${item[1]}</p>
                <p><b>วันที่:</b> ${item[2]}</p>
                <p><b>รายละเอียด:</b> ${item[3]}</p>
            `;
        }else{
            result.innerHTML =
              '<p>ไม่พบข้อมูล</p>';
        }

    }catch(e){
        result.innerHTML =
          '<p>เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
    }
}
</script>
```
