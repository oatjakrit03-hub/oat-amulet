<!-- แทนที่แท็กสคริปต์เดิมในหน้า index.html ด้วยโค้ดชุดนี้ครับ -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// ตั้งค่าคอนฟิก Firebase ให้ตรงกับฐานข้อมูลหลังบ้าน
const firebaseConfig = {
    apiKey: "AIzaSyAAZrikwva7Va3v6F4C4TKk1wrZpOlDmEs",
    authDomain: "oat-amulet-shop.firebaseapp.com",
    projectId: "oat-amulet-shop",
    storageBucket: "oat-amulet-shop.firebasestorage.app",
    messagingSenderId: "868077170885",
    appId: "1:868077170885:web:4a8f79eea590138aa5c0ac",
    measurementId: "G-GLR77H4VEH"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentSlides = [];
let currentSlideIndex = 0;

async function searchCert() {
    const certInput = document.getElementById('certNo').value.trim().toUpperCase();
    const resultDiv = document.getElementById('result');

    if (!certInput) {
        resultDiv.innerHTML = 'กรุณากรอกเลขรับประกัน';
        return;
    }

    resultDiv.innerHTML = 'กำลังค้นหาข้อมูลในระบบฐานข้อมูล...';

    try {
        // เปลี่ยนระบบยิงไปหาที่คอลเลกชัน amulets ใน Firebase แทนไฟล์ Google Sheets
        const querySnapshot = await db.collection("amulets").where("certNo", "==", certInput).get();

        if (!querySnapshot.empty) {
            // ดึงข้อมูลแถวแรกที่เจอเลขรับประกันตรงกัน
            const doc = querySnapshot.docs[0];
            const data = doc.data();
            
            // เตรียมสไลด์รูปภาพใบรับรอง (ดึงมาจากฟิลด์ certImages ที่เก็บลิงก์ ImgBB ไว้)
            currentSlides = data.certImages || [];
            currentSlideIndex = 0;

            let imageSectionHtml = '';
            if (currentSlides.length > 0) {
                imageSectionHtml = `
                    <div class="result-image">
                        <div class="slider" style="position:relative; display:inline-block;">
                            <img id="certSlideImg" class="slide active" src="${currentSlides[0]}" onclick="openLightbox(this.src)" style="width:100%; max-width:700px; border-radius:20px; border:3px solid #d4af37; box-shadow:0 0 35px rgba(212,175,55,.5); cursor:pointer;">
                            ${currentSlides.length > 1 ? `
                                <button class="prev" onclick="changeSlide(-1)" style="position:absolute; top:50%; left:10px; background:rgba(0,0,0,0.5); color:#fff; border:none; padding:10px; cursor:pointer;">❮</button>
                                <button class="next" onclick="changeSlide(1)" style="position:absolute; top:50%; right:10px; background:rgba(0,0,0,0.5); color:#fff; border:none; padding:10px; cursor:pointer;">❯</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            let html = `
            <h3 style="color:#d4af37; text-align:center; margin-bottom:35px; font-size:28px;">
            ✓ พระเครื่ององค์นี้รับประกันแท้จากทางร้าน
            </h3>
            <div class="result-layout">
                <div class="result-info">
                    <p><b>เลขรับประกัน :</b> ${data.certNo || '-'}</p>
                    <p><b>เกจิ :</b> ${data.geji || '-'}</p>
                    <p><b>วัด :</b> ${data.wat || '-'}</p>
                    <p><b>พิมพ์ :</b> ${data.pim || '-'}</p>
                    <p><b>เนื้อ :</b> ${data.nuea || '-'}</p>
                    <p><b>วันที่ออกบัตร :</b> ${data.certDate || '-'}</p>
                    <p><b>ชื่อเจ้าของ :</b> ${data.owner || '-'}</p>
                    <p><b>ราคาเช่าบูชา :</b> ${data.price || '-'} บาท</p>
                    <p style="margin-top:15px;"><a href="detail.html?id=${doc.id}" style="color:#d4af37; text-decoration:underline; font-weight:bold;">🔍 ดูรายละเอียดหน้าพระเครื่องพร้อมเช่า</a></p>
                </div>
                ${imageSectionHtml}
            </div>
            `;
            resultDiv.innerHTML = html;
        } else {
            resultDiv.innerHTML = `<span style="color:#ff8080;">ไม่พบข้อมูลเลขรับประกันนี้ในระบบ</span>`;
        }
    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `<span style="color:#ff8080;">เกิดข้อผิดพลาดในการโหลดข้อมูลจากระบบหลังบ้าน</span>`;
    }
}

// ฟังก์ชันควบคุมสไลด์รูปภาพใบรับรอง
window.changeSlide = function(direction) {
    if (currentSlides.length <= 1) return;
    currentSlideIndex += direction;
    if (currentSlideIndex >= currentSlides.length) currentSlideIndex = 0;
    if (currentSlideIndex < 0) currentSlideIndex = currentSlides.length - 1;
    document.getElementById('certSlideImg').src = currentSlides[currentSlideIndex];
}

// รองรับการกดปุ่ม Enter ในการค้นหา
document.getElementById('certNo').addEventListener('keypress', function(e){
    if (e.key === 'Enter') { searchCert(); }
});

function openLightbox(src){
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("show");
}

function closeLightbox(){
    document.getElementById("lightbox").classList.remove("show");
}
</script>
