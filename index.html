<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9003I_DGkUhx1z3ajec368wXSWvy2_ECpxSBT8cgNi4cPWyuR4QmJwidYZ7oiv2k-V8JUP0ue9Un6/pub?output=csv';

async function searchCert() {
    const cert = document.getElementById('certNo').value.trim().toUpperCase();
    const result = document.getElementById('result');

    if (!cert) {
        result.innerHTML = 'กรุณากรอกเลขรับประกัน';
        return;
    }

    result.innerHTML = 'กำลังค้นหาข้อมูล...';

    try {
        const response = await fetch(csvUrl);
        const text = await response.text();

        // 1. แยกแถว และกรองแถวที่เป็นช่องว่างออกไปก่อน
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
        
        // 2. แปลงข้อมูลแต่ละแถวเป็น Array คอลัมน์
        const allData = rows.map(row => {
            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
        });

        // 3. ค้นหาแถวที่มีหัวข้อ 'certificate_no' เพื่อเริ่มต้นอ่านข้อมูลจริงหลังจากแถวนั้น
        const headerIndex = allData.findIndex(row => row[0] && row[0].toLowerCase().includes('certificate_no'));
        
        if (headerIndex === -1) {
            result.innerHTML = '<span style="color:#ff8080;">โครงสร้างตารางไม่ถูกต้อง (ไม่พบหัวข้อ certificate_no)</span>';
            return;
        }

        // ดึงเฉพาะข้อมูลที่อยู่ใต้หัวตารางลงมา
        const dataRows = allData.slice(headerIndex + 1);

        // 4. ค้นหาเลขรับประกัน (คอลัมน์แรก Index 0)
        const found = dataRows.find(row => row[0] && row[0].toUpperCase() === cert);

        if (found) {
            // เช็คว่ามีคอลัมน์รูปภาพ (Index 8 หรือคอลัมน์ที่ 9) และมีข้อมูลลิงก์ไหม
            let imageHtml = '';
            if (found[8] && (found[8].startsWith('http://') || found[8].startsWith('https://'))) {
                imageHtml = `<div style="margin-top:15px;"><img src="${found[8]}" alt="รูปพระเครื่อง" style="max-width:100%; max-height:300px; border-radius:8px; border:2px solid #d4af37;"></div>`;
            }

            result.innerHTML = `
                <h3 style="color:#d4af37;">
                    ✓ รับประกันแท้จากทางร้าน
                </h3>
                
                ${imageHtml} <p style="margin-top:15px;"><b>เลขรับประกัน :</b> ${found[0] || '-'}</p>
                <p><b>เกจิ :</b> ${found[1] || '-'}</p>
                <p><b>วัด :</b> ${found[2] || '-'}</p>
                <p><b>พิมพ์ :</b> ${found[3] || '-'}</p>
                <p><b>เนื้อ :</b> ${found[4] || '-'}</p>
                <p><b>วันที่ออกบัตร :</b> ${found[5] || '-'}</p>
                <p><b>ชื่อเจ้าของ :</b> ${found[6] || '-'}</p>
                <p><b>ราคา :</b> ${found[7] || '-'}</p>
                <p><b>รูปภาพ :</b> ${found[8] || '-'}</p>
            `;
        } else {
            result.innerHTML = '<span style="color:#ff8080;">ไม่พบข้อมูลเลขรับประกันนี้</span>';
        }

    } catch (error) {
        console.error(error);
        result.innerHTML = '<span style="color:#ff8080;">เกิดข้อผิดพลาดในการโหลดข้อมูล</span>';
    }
}
</script>
