<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body{
    margin:0;
    font-family:tahoma;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:300px;
    background:#1c1c1c;
    border:1px solid gold;
    padding:20px;
    border-radius:10px;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h3>เข้าสู่ระบบ Admin</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234"){
        localStorage.setItem("admin","true");
        window.location.href = "admin.html";
    }else{
        alert("รหัสไม่ถูกต้อง");
    }
}
</script>

</body>
</html>
